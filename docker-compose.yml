version: "3.9"

networks:
  dcgg-net:
    driver: bridge

volumes:
  pgdata:
  miniodata:

services:
  postgres:
    image: postgres:16-alpine
    container_name: dcgg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dcgg-net

  minio:
    image: minio/minio:latest
    container_name: dcgg-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - miniodata:/data
      - miniodata:/root/.minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dcgg-net

  createbuckets:
    image: minio/mc
    container_name: dcgg-createbuckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set dcgg http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}) do echo 'waiting for minio...' && sleep 2; done;
      /usr/bin/mc mb -p dcgg/dcgg-outputs || true;
      /usr/bin/mc mb -p dcgg/dcgg-avatars || true;
      /usr/bin/mc mb -p dcgg/dcgg-templates || true;
      /usr/bin/mc mb -p dcgg/dcgg-memberships || true;
      /usr/bin/mc anonymous set download dcgg/dcgg-avatars || true;
      /usr/bin/mc anonymous set none dcgg/dcgg-outputs || true;
      /usr/bin/mc anonymous set none dcgg/dcgg-templates || true;
      /usr/bin/mc anonymous set none dcgg/dcgg-memberships || true;
      exit 0;
      "
    networks:
      - dcgg-net

  backend:
    build:
      context: ./backend
    container_name: dcgg-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./prototype:/prototype:ro
    networks:
      - dcgg-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE}
    container_name: dcgg-frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env
    ports:
      - "127.0.0.1:5173:5173"
      - "80:80"
    networks:
      - dcgg-net
