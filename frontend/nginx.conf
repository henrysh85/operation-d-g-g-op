server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Docker's embedded DNS so we re-resolve the backend container after restarts
  # (otherwise nginx caches the IP at startup and 502s once Docker reschedules).
  resolver 127.0.0.11 valid=10s ipv6=off;

  # API proxy to backend service. Using a variable forces re-resolution.
  location /api/ {
    set $backend_upstream "backend:8080";
    proxy_pass http://$backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    client_max_body_size 30m;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(?:css|js|woff2?|ttf|svg|png|jpg|jpeg|gif|ico)$ {
    expires 30d;
    access_log off;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml;
  gzip_min_length 1024;
}
