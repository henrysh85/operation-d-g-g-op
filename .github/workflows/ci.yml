name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dcgg
          POSTGRES_PASSWORD: dcgg
          POSTGRES_DB: dcgg_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U dcgg -d dcgg_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_URL: postgres://dcgg:dcgg@localhost:5432/dcgg_test?sslmode=disable
      JWT_SECRET: ci-secret
      HR_PIN: "000000"
      PORT: "8080"
      ENV: test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Download modules
        run: go mod download
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./... -race -count=1
      - name: Build
        run: go build ./...

  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
